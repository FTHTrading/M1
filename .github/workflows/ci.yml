name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      # Dummy env vars so the build doesn't fail without real secrets
      DATABASE_URL: postgresql://fth:fth_dev_2026@localhost:5432/treasury_os
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-placeholder-secret-32chars-min
      CIRCLE_WEBHOOK_SECRET: ci-placeholder
      FTH_L1_API_URL: http://localhost:9000
      FTH_L1_API_KEY: ci-placeholder
      APOSTLE_URL: http://localhost:7332
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
